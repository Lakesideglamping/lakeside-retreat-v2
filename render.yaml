services:
  - type: web
    name: lakeside-retreat
    runtime: node
    plan: starter
    buildCommand: npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lakeside-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UPLISTING_API_KEY
        sync: false
      - key: UPLISTING_WEBHOOK_SECRET
        sync: false
      - key: UPLISTING_PINOT_ID
        sync: false
      - key: UPLISTING_ROSE_ID
        sync: false
      - key: UPLISTING_COTTAGE_ID
        sync: false
      - key: EMAIL_HOST
        value: smtp.titan.email
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        value: https://lakesideretreat.co.nz
      - key: RESET_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: MAINTENANCE_MODE
        value: "false"
      - key: ICAL_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false

  - type: cron
    name: lakeside-cron
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: echo "no build needed"
    startCommand: bash scripts/cron-tick.sh
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: BASE_URL
        value: https://lakesideretreat.co.nz
